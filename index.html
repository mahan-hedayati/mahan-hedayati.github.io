<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ماهان هدایتی</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #f0eeff;
      --muted: #6b6a80;
      --border: #1e1e2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Vazirmatn', 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; right: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: #ff6ec7;
      bottom: -100px; left: -100px;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(-60px, 80px); } }
    @keyframes drift2 { to { transform: translate(60px, -60px); } }

    /* Grid lines */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Main card */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 640px;
      width: 100%;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent2);
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Name */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f0eeff 30%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle */
    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.8;
      font-weight: 300;
    }
    .subtitle span {
      color: var(--accent2);
      font-weight: 400;
    }

    /* Coming Soon text */
    .coming-soon {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .coming-soon::before, .coming-soon::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 3px;
      width: 200px;
      margin: 0 auto 2.5rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      animation: load 3s ease-out forwards 0.5s;
    }
    @keyframes load { to { width: 72%; } }

    /* Social links */
    .socials {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.02);
    }
    .social-link:hover {
      border-color: rgba(108,99,255,0.5);
      color: var(--text);
      background: rgba(108,99,255,0.08);
      transform: translateY(-2px);
    }
    .social-link svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }

    /* Floating tag bottom */
    .footer-tag {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--border);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 1px;
      z-index: 1;
    }

    /* Fade in animation */
    .container > * {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }
    .badge { animation-delay: 0.1s; }
    h1 { animation-delay: 0.25s; }
    .subtitle { animation-delay: 0.4s; }
    .coming-soon { animation-delay: 0.5s; }
    .progress-wrap { animation-delay: 0.55s; }
    .socials { animation-delay: 0.7s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .container > * { opacity: 1; }
    }
  </style>
</head>
<body>
